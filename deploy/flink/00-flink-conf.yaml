# Flink cluster config for the portable (Beam) streaming job (M6).
#
# Single-node / dev footprint, matching the rest of deploy/. One JobManager, no
# HA. Checkpoints go to S3 (the MinIO already bundled with Mimir) so JobManager
# and TaskManager — separate pods — share durable state; a filesystem backend
# would need an RWX volume k3s' local-path does not provide.
#
# S3 endpoint lives here (non-secret); credentials come from the flink-s3-creds
# Secret as AWS_* env on the JM/TM pods (see 10-/20-). After a Flink/Beam bump,
# keep the image tags and the beam_flink<ver>_job_server tag in lockstep.
apiVersion: v1
kind: ConfigMap
metadata:
  name: flink-config
  namespace: patchtst
  labels:
    app.kubernetes.io/part-of: patchtst-pipeline
    app.kubernetes.io/component: flink
data:
  flink-conf.yaml: |
    jobmanager.rpc.address: flink-jobmanager
    jobmanager.rpc.port: 6123
    jobmanager.memory.process.size: 1024m
    taskmanager.memory.process.size: 2048m
    taskmanager.numberOfTaskSlots: 2
    parallelism.default: 2

    # Durable state + exactly-once windows (the reason for Flink over Direct).
    state.backend: rocksdb
    state.checkpoints.dir: s3://patchtst-flink/checkpoints
    state.savepoints.dir: s3://patchtst-flink/savepoints
    execution.checkpointing.interval: 30 s
    execution.checkpointing.mode: EXACTLY_ONCE

    # S3A filesystem -> MinIO. Credentials injected as AWS_* env (Secret).
    fs.s3a.endpoint: http://mimir-minio.patchtst.svc:9000
    fs.s3a.path.style.access: "true"
    s3.endpoint: http://mimir-minio.patchtst.svc:9000
    s3.path.style.access: "true"
  # Enable the built-in S3 plugin at container start.
  ENABLE_BUILT_IN_PLUGINS: flink-s3-fs-hadoop-1.18.1.jar
---
# Placeholder credentials for the MinIO bucket. Replace with the real MinIO
# access/secret keys (kubectl create secret generic flink-s3-creds ...), or wire
# to an existing secret. Base64 of "changeme".
apiVersion: v1
kind: Secret
metadata:
  name: flink-s3-creds
  namespace: patchtst
  labels:
    app.kubernetes.io/part-of: patchtst-pipeline
    app.kubernetes.io/component: flink
type: Opaque
data:
  AWS_ACCESS_KEY_ID: Y2hhbmdlbWU=
  AWS_SECRET_ACCESS_KEY: Y2hhbmdlbWU=
